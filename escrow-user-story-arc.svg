<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="background:#0F1117;font-family:system-ui,-apple-system,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-size="16" font-weight="500" fill="#E2E8F0">Escrow — user story arc</text>

<!-- Step 1: Buyer deploys -->
<rect x="220" y="50" width="240" height="56" rx="8" fill="#2D1B69" stroke="#7F77DD" stroke-width="0.5"/>
<text x="340" y="72" text-anchor="middle" font-size="14" font-weight="500" fill="#CEC8F6">Buyer deploys escrow</text>
<text x="340" y="90" text-anchor="middle" font-size="12" fill="#94A3B8">constructor(seller, deadline)</text>

<!-- State label -->
<rect x="500" y="58" width="150" height="28" rx="6" fill="#1A1D27" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="575" y="76" text-anchor="middle" font-size="11" fill="#94A3B8">AWAITING_DEPOSIT</text>
<line x1="460" y1="72" x2="498" y2="72" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Arrow down -->
<line x1="340" y1="106" x2="340" y2="146" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Step 2: Buyer deposits -->
<rect x="220" y="148" width="240" height="56" rx="8" fill="#0C2D4C" stroke="#378ADD" stroke-width="0.5"/>
<text x="340" y="170" text-anchor="middle" font-size="14" font-weight="500" fill="#85B7EB">Buyer deposits ETH</text>
<text x="340" y="188" text-anchor="middle" font-size="12" fill="#94A3B8">deposit() — onlyBuyer</text>

<!-- State label -->
<rect x="490" y="156" width="175" height="28" rx="6" fill="#1A1D27" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="578" y="174" text-anchor="middle" font-size="10" fill="#94A3B8">AWAITING_CONFIRMATION</text>
<line x1="460" y1="170" x2="488" y2="170" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Off-chain delivery -->
<rect x="40" y="228" width="180" height="56" rx="8" fill="#3D1A0C" stroke="#D85A30" stroke-width="0.5"/>
<text x="130" y="250" text-anchor="middle" font-size="14" font-weight="500" fill="#F0997B">Off-chain delivery</text>
<text x="130" y="268" text-anchor="middle" font-size="12" fill="#94A3B8">Seller ships goods/service</text>

<!-- Arrow to decision -->
<line x1="340" y1="204" x2="340" y2="260" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Decision diamond -->
<polygon points="340,260 410,300 340,340 270,300" fill="#1A1D27" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="304" text-anchor="middle" font-size="14" font-weight="500" fill="#E2E8F0">Outcome?</text>

<!-- Left branch: Buyer confirms -->
<line x1="270" y1="300" x2="140" y2="300" stroke="#94A3B8" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="200" y="290" font-size="12" fill="#9FE1CB">Buyer confirms</text>

<rect x="30" y="320" width="200" height="56" rx="8" fill="#0A3D2E" stroke="#1D9E75" stroke-width="0.5"/>
<text x="130" y="342" text-anchor="middle" font-size="14" font-weight="500" fill="#9FE1CB">confirmReceived()</text>
<text x="130" y="360" text-anchor="middle" font-size="12" fill="#94A3B8">onlyBuyer</text>

<line x1="130" y1="376" x2="130" y2="416" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="30" y="418" width="200" height="44" rx="8" fill="#0A3D2E" stroke="#1D9E75" stroke-width="0.5"/>
<text x="130" y="444" text-anchor="middle" font-size="14" font-weight="500" fill="#9FE1CB">Seller gets paid</text>

<!-- State: COMPLETE -->
<rect x="30" y="476" width="200" height="28" rx="6" fill="#1A1D27" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="130" y="494" text-anchor="middle" font-size="12" fill="#34D399">State → COMPLETE</text>
<line x1="130" y1="462" x2="130" y2="474" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Right branch: Deadline passes -->
<line x1="410" y1="300" x2="530" y2="300" stroke="#94A3B8" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="440" y="290" font-size="12" fill="#F09595">Deadline passes</text>

<rect x="440" y="320" width="200" height="56" rx="8" fill="#3D1313" stroke="#E24B4A" stroke-width="0.5"/>
<text x="540" y="342" text-anchor="middle" font-size="14" font-weight="500" fill="#F09595">refund()</text>
<text x="540" y="360" text-anchor="middle" font-size="12" fill="#94A3B8">Anyone can call</text>

<line x1="540" y1="376" x2="540" y2="416" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="440" y="418" width="200" height="44" rx="8" fill="#3D1313" stroke="#E24B4A" stroke-width="0.5"/>
<text x="540" y="444" text-anchor="middle" font-size="14" font-weight="500" fill="#F09595">Buyer gets refunded</text>

<!-- State: REFUNDED -->
<rect x="440" y="476" width="200" height="28" rx="6" fill="#1A1D27" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="540" y="494" text-anchor="middle" font-size="12" fill="#E24B4A">State → REFUNDED</text>
<line x1="540" y1="462" x2="540" y2="474" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Bottom annotation -->
<text x="340" y="540" text-anchor="middle" font-size="12" fill="#64748B">No arbiter at any step — the state machine + deadline handle every path</text>
</svg>
