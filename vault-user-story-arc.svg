<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" style="background:#0F1117;font-family:system-ui,-apple-system,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-size="16" font-weight="500" fill="#E2E8F0">Vault — user story arc</text>

<!-- Owner deploys -->
<rect x="40" y="60" width="160" height="56" rx="8" fill="#2D1B69" stroke="#7F77DD" stroke-width="0.5"/>
<text x="120" y="82" text-anchor="middle" font-size="14" font-weight="500" fill="#CEC8F6">Owner deploys</text>
<text x="120" y="100" text-anchor="middle" font-size="12" fill="#94A3B8">constructor()</text>

<!-- Arrow -->
<line x1="200" y1="88" x2="260" y2="88" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Contract live -->
<rect x="262" y="60" width="160" height="56" rx="8" fill="#0A3D2E" stroke="#1D9E75" stroke-width="0.5"/>
<text x="342" y="82" text-anchor="middle" font-size="14" font-weight="500" fill="#9FE1CB">Contract live</text>
<text x="342" y="100" text-anchor="middle" font-size="12" fill="#94A3B8">owner = msg.sender</text>

<!-- Arrow down -->
<line x1="342" y1="116" x2="342" y2="160" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Anyone deposits -->
<rect x="170" y="162" width="340" height="56" rx="8" fill="#0C2D4C" stroke="#378ADD" stroke-width="0.5"/>
<text x="340" y="184" text-anchor="middle" font-size="14" font-weight="500" fill="#85B7EB">Anyone deposits ETH</text>
<text x="340" y="202" text-anchor="middle" font-size="12" fill="#94A3B8">deposit() — payable, no access control</text>

<!-- Anyone label -->
<text x="120" y="194" text-anchor="middle" font-size="12" fill="#94A3B8">Any wallet</text>
<line x1="155" y1="190" x2="168" y2="190" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow down -->
<line x1="340" y1="218" x2="340" y2="255" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>
<text x="356" y="240" font-size="12" fill="#94A3B8">balance += msg.value</text>

<!-- Owner withdraws -->
<rect x="170" y="258" width="340" height="56" rx="8" fill="#3D2506" stroke="#BA7517" stroke-width="0.5"/>
<text x="340" y="280" text-anchor="middle" font-size="14" font-weight="500" fill="#FAC775">Owner withdraws</text>
<text x="340" y="298" text-anchor="middle" font-size="12" fill="#94A3B8">withdraw(amount) — onlyOwner</text>

<!-- Lock label -->
<text x="555" y="290" font-size="12" fill="#94A3B8">onlyOwner guard</text>
<line x1="510" y1="286" x2="548" y2="286" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow down -->
<line x1="340" y1="314" x2="340" y2="348" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ETH sent -->
<rect x="230" y="340" width="220" height="36" rx="8" fill="#1A1D27" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="362" text-anchor="middle" font-size="14" font-weight="500" fill="#E2E8F0">ETH sent to owner</text>
</svg>
